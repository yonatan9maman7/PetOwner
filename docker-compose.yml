# Local stack: API + SQL Server 2022 (reference for Railway-style env: ConnectionStrings__DefaultConnection or DATABASE_URL)
services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "PetOwner_Local_Dev_Strong!1"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "PetOwner_Local_Dev_Strong!1" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sql,1433;Database=PetOwner;User Id=sa;Password=PetOwner_Local_Dev_Strong!1;TrustServerCertificate=True;Encrypt=True;Command Timeout=300;"
    depends_on:
      sql:
        condition: service_healthy

volumes:
  sql_data:
