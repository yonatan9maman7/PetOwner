@if (isOpen) {
  <div
    class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4"
    role="presentation"
    (mousedown)="onOverlayMouseDown($event)">
    <div
      class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-3xl max-h-[85vh] flex flex-col mx-4 overflow-hidden relative"
      dir="auto"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="dialogTitleId"
      (mousedown)="$event.stopPropagation()">
      <!-- Header -->
      <div
        class="flex flex-wrap items-center gap-3 shrink-0 border-b border-gray-100 dark:border-gray-700 px-4 py-3 md:px-6 bg-white dark:bg-gray-800">
        <h2
          [id]="dialogTitleId"
          class="text-lg font-semibold text-gray-900 dark:text-white flex-1 min-w-0 text-start">
          {{ 'TERMS.TITLE' | translate }}
        </h2>
        <div class="flex items-center gap-2 shrink-0 ms-auto">
          <button
            type="button"
            (click)="languageService.toggleLanguage()"
            class="px-2.5 py-1.5 text-xs font-bold tabular-nums rounded-lg border border-gray-200 dark:border-gray-600
                   bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-600 transition-colors"
            aria-label="Switch language">
            {{ languageService.currentLang() === 'he' ? 'EN' : 'HE' }}
          </button>
          <button
            type="button"
            (click)="close.emit()"
            class="p-2 rounded-lg text-gray-500 hover:text-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-gray-400 dark:hover:text-white transition-colors"
            [attr.aria-label]="'TERMS.CLOSE' | translate">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Body -->
      <div
        class="overflow-y-auto p-6 flex-1 min-h-0 text-gray-700 dark:text-gray-200 text-sm leading-relaxed whitespace-pre-wrap text-start">
        {{ 'TERMS.CONTENT' | translate }}
      </div>

      <!-- Footer -->
      <div
        class="shrink-0 border-t border-gray-100 dark:border-gray-700 px-4 py-3 md:px-6 flex justify-end bg-gray-50/80 dark:bg-gray-900/40">
        <button
          type="button"
          (click)="close.emit()"
          class="inline-flex items-center justify-center rounded-xl bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-700 active:bg-indigo-800 transition-colors">
          {{ 'TERMS.CLOSE' | translate }}
        </button>
      </div>
    </div>
  </div>
}
